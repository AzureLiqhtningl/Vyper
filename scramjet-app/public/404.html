<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
        />
        <title>Scramjet | Error</title>
        <base href="/" />
        <link rel="shortcut icon" content="favicon.ico" />
        <link rel="stylesheet" href="index.css" />

        <!-- Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

        <style>
            body {
                background: #000;
                color: white;
                margin: 0;
                font-family: 'Space Mono', monospace;
            }

            /* Glitch Title */
            .glitch {
                position: relative;
                font-size: 42px;
                font-weight: 700;
                color: #fff;
                text-shadow: 0 0 10px #00ff88;
                animation: glitch-flicker 2s infinite;
            }

            .glitch::before,
            .glitch::after {
                content: attr(data-text);
                position: absolute;
                left: 0;
                top: 0;
                opacity: 0.7;
            }

            .glitch::before {
                color: #00ff88;
                transform: translate(2px, -2px);
            }

            .glitch::after {
                color: #ff00ff;
                transform: translate(-2px, 2px);
            }

            @keyframes glitch-flicker {
                0% { opacity: 1; }
                50% { opacity: 0.85; }
                100% { opacity: 1; }
            }

            /* Neon Animated 404 */
            .error-code {
                font-family: 'Pixelify Sans', cursive;
                font-size: 90px;
                font-weight: 700;
                text-align: left;
                margin: 20px 0 0 20px;
                color: #00ff88;
                text-shadow:
                    0 0 10px #00ff88,
                    0 0 20px #00ff88,
                    0 0 40px #00ff88;
                animation: pulse404 2s infinite ease-in-out;
            }

            @keyframes pulse404 {
                0% {
                    text-shadow:
                        0 0 10px #00ff88,
                        0 0 20px #00ff88,
                        0 0 40px #00ff88;
                    transform: scale(1);
                    opacity: 1;
                }
                50% {
                    text-shadow:
                        0 0 20px #00ff88,
                        0 0 40px #00ff88,
                        0 0 60px #00ff88;
                    transform: scale(1.08);
                    opacity: 0.85;
                }
                100% {
                    text-shadow:
                        0 0 10px #00ff88,
                        0 0 20px #00ff88,
                        0 0 40px #00ff88;
                    transform: scale(1);
                    opacity: 1;
                }
            }

            /* Error Box */
            .error-box {
                margin: 20px 20px;
                padding: 25px;
                border-left: 4px solid #00ff88;
                background: #0a0a0a;
                box-shadow: 0 0 20px #00ff88;
                animation: glow 2.5s ease-in-out infinite;
                max-width: 600px;
            }

            @keyframes glow {
                0% { box-shadow: 0 0 10px #00ff88; }
                50% { box-shadow: 0 0 25px #00ff88; }
                100% { box-shadow: 0 0 10px #00ff88; }
            }

            /* Error Message */
            .error-msg {
                font-size: 18px;
                color: #cfcfcf;
                opacity: 0;
                animation: fadeIn 1.2s forwards;
                font-family: 'Pixelify Sans', cursive;
            }

            @keyframes fadeIn {
                to { opacity: 1; }
            }

            /* Return Button */
            .back-btn {
                display: inline-block;
                margin-top: 20px;
                padding: 12px 24px;
                border: 2px solid #00ff88;
                color: #00ff88;
                text-decoration: none;
                border-radius: 6px;
                transition: 0.25s;
                font-family: 'Space Mono', monospace;
            }

            .back-btn:hover {
                background: #00ff88;
                color: #000;
                box-shadow: 0 0 20px #00ff88;
            }

            footer {
                margin: 40px 20px;
                color: #888;
            }

            footer a {
                color: #00ff88;
                text-decoration: none;
            }

            footer a:hover {
                text-decoration: underline;
            }
        </style>
    </head>

    <body>
        <div class="logo-wrapper left-margin">
            <h1 class="glitch" data-text="Scramjet | Error">Scramjet | Error</h1>
        </div>

        <div class="error-code">404</div>

        <div class="error-box left-margin">
            <p class="error-msg">The server could not route your request.</p>
            <a href="/" class="back-btn">Return to Vyper</a>
        </div>

        <footer>
            <a title="License information" href="credits.html">Credits</a>
            <span>Scramjet &copy; MW 2025</span>
        </footer>
    </body>
</html>
