<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
        <title>Vyper — 404</title>
        <base href="/" />
        <link rel="shortcut icon" href="logo.png" />
        <link rel="stylesheet" href="index.css" />

        <style>
            .error-page {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 80vh;
                text-align: center;
                padding: 20px;
            }

            .error-code {
                font-family: "JetBrains Mono", "Exo 2", monospace;
                font-size: clamp(80px, 15vw, 140px);
                font-weight: 700;
                color: var(--neon);
                line-height: 1;
                margin-bottom: 8px;
                text-shadow:
                    0 0 20px var(--neon-glow),
                    0 0 60px rgba(88, 240, 12, 0.15);
                animation: pulse404 3s ease-in-out infinite;
                letter-spacing: -0.04em;
            }

            @keyframes pulse404 {
                0%, 100% {
                    text-shadow:
                        0 0 20px var(--neon-glow),
                        0 0 60px rgba(88, 240, 12, 0.15);
                    opacity: 1;
                }
                50% {
                    text-shadow:
                        0 0 30px var(--neon-glow),
                        0 0 80px rgba(88, 240, 12, 0.25);
                    opacity: 0.9;
                }
            }

            .error-title {
                font-family: "Exo 2", sans-serif;
                font-size: clamp(18px, 3vw, 24px);
                font-weight: 600;
                color: var(--text-primary);
                margin-bottom: 12px;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }

            .error-msg {
                font-size: 15px;
                color: var(--text-secondary);
                max-width: 400px;
                line-height: 1.7;
                font-weight: 300;
                margin-bottom: 32px;
            }

            .back-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 14px 32px;
                border: 1px solid var(--border-hover);
                color: var(--neon);
                background: rgba(88, 240, 12, 0.04);
                text-decoration: none;
                border-radius: var(--radius-full);
                font-family: "Inter", sans-serif;
                font-size: 14px;
                font-weight: 500;
                letter-spacing: 0.03em;
                transition:
                    background var(--transition-fast),
                    border-color var(--transition-fast),
                    transform var(--transition-spring),
                    box-shadow var(--transition-fast);
            }

            .back-btn:hover {
                background: rgba(88, 240, 12, 0.1);
                border-color: var(--neon);
                transform: translateY(-2px);
                box-shadow: 0 8px 30px rgba(88, 240, 12, 0.12);
                color: var(--neon);
                text-shadow: none;
            }

            .back-btn:active {
                transform: translateY(0) scale(0.98);
            }

            .error-footer {
                margin-top: auto;
                padding: 24px 20px;
                text-align: center;
            }

            .error-footer a {
                color: var(--text-muted);
                text-decoration: none;
                font-size: 13px;
                transition: color var(--transition-fast);
            }

            .error-footer a:hover {
                color: var(--neon);
            }

            .error-footer span {
                color: var(--text-muted);
                font-size: 13px;
                margin-left: 16px;
            }
        </style>
    </head>

    <body>
        <div class="error-page">
            <div class="error-code">404</div>
            <div class="error-title">Page Not Found</div>
            <p class="error-msg">
                The server could not route your request.
                The page you're looking for doesn't exist or has been moved.
            </p>
            <a href="/" class="back-btn">
                ← Return to Vyper
            </a>
        </div>

        <div class="error-footer">
            <a title="License information" href="credits.html">Credits</a>
            <span>Vyper &copy; 2025</span>
        </div>
    </body>
</html>
