<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
	<title>Vyper | AI</title>
	<link rel="shortcut icon" href="logo.png" />
	<script src="theme.js"></script>
	<link rel="stylesheet" href="index.css" />
	<style>
		body { display: flex; flex-direction: column; min-height: 100vh; }

		.ai-container {
			margin-top: 80px;
			flex: 1;
			display: flex;
			flex-direction: column;
			max-width: 860px;
			width: 100%;
			margin-left: auto;
			margin-right: auto;
			padding: 32px 20px 20px;
			height: calc(100vh - 80px);
		}

		.ai-header {
			text-align: center;
			margin-bottom: 24px;
			flex-shrink: 0;
		}

		.ai-header h1 {
			font-family: 'Atomic Age', cursive;
			font-size: 40px;
			color: var(--vyper-accent);
			text-shadow: 0 0 8px var(--vyper-accent), 0 0 16px var(--vyper-accent);
			margin: 0 0 6px 0;
		}

		.ai-header p {
			font-family: 'Pixelify Sans', sans-serif;
			font-size: 15px;
			color: var(--vyper-text);
			margin: 0;
			opacity: 0.7;
		}

		/* Chat window */
		.chat-window {
			flex: 1;
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			gap: 14px;
			padding: 16px;
			background: rgba(0,0,0,0.3);
			border: 1px solid var(--vyper-border);
			border-radius: 14px;
			margin-bottom: 16px;
			scroll-behavior: smooth;
		}

		.chat-window::-webkit-scrollbar { width: 6px; }
		.chat-window::-webkit-scrollbar-track { background: transparent; }
		.chat-window::-webkit-scrollbar-thumb { background: var(--vyper-border); border-radius: 3px; }

		/* Messages */
		.message {
			display: flex;
			gap: 10px;
			animation: msgIn 0.25s ease;
		}
		@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

		.message.user { flex-direction: row-reverse; }

		.message-avatar {
			width: 32px;
			height: 32px;
			border-radius: 50%;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 16px;
			border: 1px solid var(--vyper-border);
			background: rgba(0,0,0,0.4);
		}

		.message.ai .message-avatar {
			background: var(--vyper-accent-glow);
			border-color: var(--vyper-accent);
		}

		.message-bubble {
			max-width: 75%;
			padding: 12px 16px;
			border-radius: 14px;
			font-family: 'Pixelify Sans', sans-serif;
			font-size: 15px;
			line-height: 1.6;
			color: var(--vyper-text);
			border: 1px solid var(--vyper-border);
			background: rgba(0,0,0,0.3);
			white-space: pre-wrap;
			word-break: break-word;
		}

		.message.user .message-bubble {
			background: var(--vyper-accent-glow);
			border-color: var(--vyper-accent);
			color: #fff;
			border-radius: 14px 14px 4px 14px;
		}

		.message.ai .message-bubble {
			border-radius: 14px 14px 14px 4px;
		}

		/* Typing indicator */
		.typing-indicator {
			display: flex;
			gap: 10px;
			align-items: center;
		}
		.typing-dots {
			display: flex;
			gap: 5px;
			padding: 12px 16px;
			background: rgba(0,0,0,0.3);
			border: 1px solid var(--vyper-border);
			border-radius: 14px 14px 14px 4px;
		}
		.typing-dots span {
			width: 8px; height: 8px;
			background: var(--vyper-accent);
			border-radius: 50%;
			animation: bounce 1.2s ease-in-out infinite;
			opacity: 0.6;
		}
		.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
		.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
		@keyframes bounce {
			0%, 80%, 100% { transform: translateY(0); }
			40% { transform: translateY(-8px); opacity: 1; }
		}

		/* Welcome message */
		.welcome-msg {
			text-align: center;
			padding: 40px 20px;
			color: var(--vyper-text);
			opacity: 0.5;
			font-family: 'Pixelify Sans', sans-serif;
			font-size: 15px;
		}
		.welcome-msg .welcome-icon { font-size: 48px; margin-bottom: 12px; }

		/* Input area */
		.chat-input-area {
			display: flex;
			gap: 10px;
			align-items: flex-end;
			flex-shrink: 0;
		}

		.chat-input {
			flex: 1;
			background: rgba(0,0,0,0.4);
			border: 1px solid var(--vyper-border);
			border-radius: 12px;
			padding: 12px 16px;
			color: var(--vyper-text);
			font-family: 'Pixelify Sans', sans-serif;
			font-size: 15px;
			outline: none;
			resize: none;
			min-height: 48px;
			max-height: 140px;
			line-height: 1.5;
			transition: border-color 0.2s;
		}
		.chat-input:focus { border-color: var(--vyper-accent); }
		.chat-input::placeholder { color: var(--vyper-text); opacity: 0.4; }

		.send-btn {
			background: var(--vyper-accent);
			border: none;
			border-radius: 12px;
			width: 48px;
			height: 48px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			flex-shrink: 0;
			transition: opacity 0.2s, transform 0.1s;
			color: #000;
		}
		.send-btn:hover { opacity: 0.85; transform: scale(1.05); }
		.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

		.clear-btn {
			background: none;
			border: 1px solid var(--vyper-border);
			border-radius: 12px;
			width: 48px;
			height: 48px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			flex-shrink: 0;
			color: var(--vyper-text);
			opacity: 0.5;
			transition: all 0.2s;
		}
		.clear-btn:hover { opacity: 1; border-color: #ff6666; color: #ff6666; }

		/* Code blocks in AI responses */
		.message-bubble code {
			font-family: 'Space Mono', monospace;
			font-size: 13px;
			background: rgba(0,0,0,0.4);
			padding: 2px 6px;
			border-radius: 4px;
			color: var(--vyper-accent);
		}
		.message-bubble pre {
			font-family: 'Space Mono', monospace;
			font-size: 13px;
			background: rgba(0,0,0,0.5);
			padding: 12px;
			border-radius: 8px;
			overflow-x: auto;
			border: 1px solid var(--vyper-border);
			margin: 8px 0;
			color: var(--vyper-accent);
		}

		/* Suggested prompts */
		.suggestions {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 12px;
			flex-shrink: 0;
		}
		.suggestion-chip {
			background: var(--vyper-accent-glow);
			border: 1px solid var(--vyper-border);
			border-radius: 999px;
			padding: 6px 14px;
			font-family: 'Pixelify Sans', sans-serif;
			font-size: 13px;
			color: var(--vyper-accent);
			cursor: pointer;
			transition: all 0.2s;
		}
		.suggestion-chip:hover {
			background: var(--vyper-accent);
			color: #000;
			border-color: var(--vyper-accent);
		}
	</style>
</head>
<body>
	<nav class="sidebar">
		<div class="sidebar-header">
			<img class="sidebar-logo" src="logo.png" alt="Vyper" />
			<h2>Vyper</h2>
		</div>
		<ul class="nav-links">
			<li><a href="index.html" class="nav-link">🌐 Home</a></li>
			<li><a href="games.html" class="nav-link">🎮 Games</a></li>
			<li><a href="movies.html" class="nav-link">🎬 Movies</a></li>
			<li><a href="ai.html" class="nav-link active">🤖 AI</a></li>
			<li><a href="settings.html" class="nav-link">⚙️ Settings</a></li>
		</ul>
	</nav>

	<div class="ai-container">
		<div class="ai-header">
			<h1>🤖 Vyper AI</h1>
			<p>Powered by Google Gemini</p>
		</div>

		<div class="chat-window" id="chat-window">
			<div class="welcome-msg" id="welcome-msg">
				<div class="welcome-icon">🤖</div>
				<div>Ask me anything!</div>
			</div>
		</div>

		<div class="suggestions" id="suggestions">
			<div class="suggestion-chip" onclick="useSuggestion(this)">What is a web proxy?</div>
			<div class="suggestion-chip" onclick="useSuggestion(this)">How does Scramjet work?</div>
			<div class="suggestion-chip" onclick="useSuggestion(this)">Tell me a fun fact</div>
			<div class="suggestion-chip" onclick="useSuggestion(this)">Write me a short poem</div>
		</div>

		<div class="chat-input-area">
			<textarea
				id="chat-input"
				class="chat-input"
				placeholder="Ask Vyper AI anything..."
				rows="1"
			></textarea>
			<button class="clear-btn" id="clear-btn" title="Clear chat">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
			</button>
			<button class="send-btn" id="send-btn" title="Send">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
			</button>
		</div>
	</div>

	<script>
		// -----------------------------------------------
		// REPLACE YOUR_API_KEY with your Gemini API key!
		// -----------------------------------------------
		const GEMINI_API_KEY = "YOUR_API_KEY";
		const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

		const chatWindow = document.getElementById("chat-window");
		const chatInput = document.getElementById("chat-input");
		const sendBtn = document.getElementById("send-btn");
		const clearBtn = document.getElementById("clear-btn");
		const welcomeMsg = document.getElementById("welcome-msg");
		const suggestions = document.getElementById("suggestions");

		// Conversation history for context
		let conversationHistory = [];

		// Auto-resize textarea
		chatInput.addEventListener("input", () => {
			chatInput.style.height = "auto";
			chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + "px";
		});

		// Send on Enter (Shift+Enter for new line)
		chatInput.addEventListener("keydown", (e) => {
			if (e.key === "Enter" && !e.shiftKey) {
				e.preventDefault();
				sendMessage();
			}
		});

		sendBtn.addEventListener("click", sendMessage);
		clearBtn.addEventListener("click", clearChat);

		function useSuggestion(chip) {
			chatInput.value = chip.textContent;
			chatInput.style.height = "auto";
			suggestions.style.display = "none";
			sendMessage();
		}

		function addMessage(role, text) {
			// Hide welcome message once chatting
			if (welcomeMsg) welcomeMsg.style.display = "none";

			const msg = document.createElement("div");
			msg.className = `message ${role}`;

			const avatar = document.createElement("div");
			avatar.className = "message-avatar";
			avatar.textContent = role === "user" ? "👤" : "🤖";

			const bubble = document.createElement("div");
			bubble.className = "message-bubble";

			// Basic markdown-like formatting
			let formatted = text
				.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
				.replace(/`([^`]+)`/g, '<code>$1</code>')
				.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
				.replace(/\*(.*?)\*/g, '<em>$1</em>');

			bubble.innerHTML = formatted;
			msg.appendChild(avatar);
			msg.appendChild(bubble);
			chatWindow.appendChild(msg);
			chatWindow.scrollTop = chatWindow.scrollHeight;
			return msg;
		}

		function showTyping() {
			const indicator = document.createElement("div");
			indicator.className = "typing-indicator";
			indicator.id = "typing-indicator";

			const avatar = document.createElement("div");
			avatar.className = "message-avatar";
			avatar.style.border = "1px solid var(--vyper-accent)";
			avatar.style.background = "var(--vyper-accent-glow)";
			avatar.textContent = "🤖";

			const dots = document.createElement("div");
			dots.className = "typing-dots";
			dots.innerHTML = "<span></span><span></span><span></span>";

			indicator.appendChild(avatar);
			indicator.appendChild(dots);
			chatWindow.appendChild(indicator);
			chatWindow.scrollTop = chatWindow.scrollHeight;
		}

		function hideTyping() {
			const indicator = document.getElementById("typing-indicator");
			if (indicator) indicator.remove();
		}

		async function sendMessage() {
			const text = chatInput.value.trim();
			if (!text || sendBtn.disabled) return;

			// Hide suggestions after first message
			suggestions.style.display = "none";

			chatInput.value = "";
			chatInput.style.height = "auto";
			sendBtn.disabled = true;

			addMessage("user", text);
			conversationHistory.push({ role: "user", parts: [{ text }] });

			showTyping();

			try {
				const response = await fetch(GEMINI_URL, {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({
						contents: conversationHistory,
						systemInstruction: {
							parts: [{
								text: "You are Vyper AI, a helpful assistant built into Vyper — a web proxy. Be concise, friendly, and helpful. You can help with general questions, coding, explanations, and anything else the user needs."
							}]
						},
						generationConfig: {
							temperature: 0.9,
							maxOutputTokens: 1024,
						}
					})
				});

				const data = await response.json();
				hideTyping();

				if (data.candidates && data.candidates[0]) {
					const reply = data.candidates[0].content.parts[0].text;
					conversationHistory.push({ role: "model", parts: [{ text: reply }] });
					addMessage("ai", reply);
				} else if (data.error) {
					addMessage("ai", `⚠️ Error: ${data.error.message}`);
				} else {
					addMessage("ai", "⚠️ Something went wrong. Check your API key.");
				}
			} catch (err) {
				hideTyping();
				addMessage("ai", `⚠️ Network error: ${err.message}`);
			}

			sendBtn.disabled = false;
			chatInput.focus();
		}

		function clearChat() {
			conversationHistory = [];
			chatWindow.innerHTML = `<div class="welcome-msg" id="welcome-msg"><div class="welcome-icon">🤖</div><div>Ask me anything!</div></div>`;
			suggestions.style.display = "flex";
		}
	</script>
</body>
</html>
