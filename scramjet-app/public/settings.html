<body>
    <!-- Top Navigation Buttons -->
    <div class="top-nav-buttons">
        <a href="index.html" class="nav-button home-button" title="Home">Home</a>

    <div class="settings-container">
        <div class="settings-menu">

                <span class="settings-icon">ℹ️</span>
                <span class="settings-label">Credits</span>
            </button>
            <button class="settings-item" data-section="themes">
                <span class="settings-icon">🎨</span>
                <span class="settings-label">Themes</span>
            </button>
            <button class="settings-item" data-section="partners">
                <span class="settings-icon">🤝</span>

            </button>
            <button class="settings-item" data-section="cloaking">
                <span class="settings-icon">👻</span>

            </button>
        </div>

        <div class="settings-content">
            <div id="credits" class="content-section active">
                <h2>Credits</h2>
                <div class="credits-section">
                    <h3>Owners</h3>
                    <p>𝖜𝖝𝖗𝖒𝖍𝖔𝖑𝖊 👑 & AzureLiqhtning</p>

                <div class="credits-section">

                </div>
                <div class="credits-section">
                    <h3>Games</h3>
                    <p>LuminSDK - Magic Leap</p>
                </div>
            </div>

            <div id="themes" class="content-section">
                <h2>Themes</h2>
                <div class="theme-grid">
                    <button class="theme-option" data-theme="neon">Neon Green</button>
                    <button class="theme-option" data-theme="blue">Blue</button>
                    <button class="theme-option" data-theme="red">Red</button>
                    <button class="theme-option" data-theme="gray">Black/Gray</button>
                </div>
            </div>

            <div id="partners" class="content-section">
                <h2>Partners</h2>
                <p>prxy info ℹ️ - King</p>
                <p>Eben Lee 🤩</p>
            </div>

         <div id="cloaking" class="content-section">
    <h2>Cloaking</h2>
    <p>Open Vyper inside an about:blank window for stealth mode.</p>

    <button id="cloak-btn" class="theme-option" style="margin-top: 10px;">
        Open Vyper in about:blank
    </button>
</div>

        </div>
