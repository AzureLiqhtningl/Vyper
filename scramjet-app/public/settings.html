<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vyper | Settings</title>

    <link rel="stylesheet" href="index.css">
    <script src="settings.js" defer></script>
    <script src="index.js" defer></script>
    <script src="cloak-dev.js" defer></script>
</head>

<body>

    <!-- NAV BAR -->
    <div id="navbar">
        <button onclick="location.href='index.html'" class="nav-btn">Home</button>
        <button onclick="location.href='games.html'" class="nav-btn">Games</button>
        <button onclick="location.href='settings.html'" class="nav-btn active">Settings</button>
    </div>

    <!-- SETTINGS PAGE -->
    <div class="settings-container">

        <div class="settings-menu">
            <div class="settings-item" data-target="themes">Themes</div>
            <div class="settings-item" data-target="about">About</div>
        </div>

        <div class="settings-content">

            <!-- THEMES -->
            <div id="themes" class="content-section active">
                <h2>Themes</h2>

                <button class="theme-option" data-theme="neon">Neon Green</button>
                <button class="theme-option" data-theme="blue">Blue</button>
                <button class="theme-option" data-theme="red">Red</button>
                <button class="theme-option" data-theme="gray">Black/Gray</button>
            </div>

            <!-- ABOUT -->
            <div id="about" class="content-section">
                <h2>About Vyper</h2>
                <p>A clean, neon‑styled web experience.</p>
            </div>

        </div>

    </div>

</body>
</html>
