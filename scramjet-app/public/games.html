<!DOCTYPE html>
<html lang="en">
<head>

<style>
    #info-panel {
        display: none !important;
    }
</style>

    <meta charset="UTF-8" />
    <title>Vyper | Games</title>

    <link rel="stylesheet" href="index.css" />

    <!-- JS -->
    <script src="info-panel.js" defer></script>
    <script src="cloak-dev.js" defer></script>
    <script src="settings.js" defer></script>
</head>

<body>

    <!-- NAV BAR -->
    <div id="navbar">
        <button onclick="location.href='index.html'" class="nav-btn">Home</button>
        <button onclick="location.href='games.html'" class="nav-btn active">Games</button>
        <button onclick="location.href='settings.html'" class="nav-btn">Settings</button>
    </div>

    <!-- MAIN CONTENT (NO LOGO, NO TITLE) -->
   <div id="games-container">
    <div id="games"></div>
</div>

    <!-- LUMIN SDK -->
    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
    <script>
        Lumin.init({
            container: '#games',
            theme: 'dark',
            dropdown: true,
            onReady: () => console.log('LuminSDK ready'),
            onError: (err) => console.error('LuminSDK error:', err)
        });
    </script>

    <!-- RIGHT INFO PANEL -->
    <div id="info-panel">
        <div id="info-content">
            <h3>Vyper Info</h3>
            <p id="online-count">Users Online: ...</p>
        </div>
    </div>

</body>
</html>
