<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vyper — Games</title>
  <link rel="shortcut icon" href="logo.png" />
  <link rel="stylesheet" href="index.css" />
  <style>
    /* Games page specific overrides */
    .games-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 40px;
      margin-bottom: 8px;
      padding: 0 20px;
    }

    .games-header img {
      height: 40px;
      filter: drop-shadow(0 0 12px rgba(88, 240, 12, 0.2));
    }

    .games-header h1 {
      font-size: clamp(20px, 3vw, 28px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: none;
      width: auto;
      border: none;
      overflow: visible;
      white-space: normal;
    }

    .games-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 28px;
      font-weight: 300;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      transition:
        color var(--transition-fast),
        background var(--transition-fast);
      margin-bottom: 20px;
    }

    .back-link:hover {
      color: var(--neon);
      background: rgba(88, 240, 12, 0.06);
      text-shadow: none;
    }

    .back-link svg {
      width: 14px;
      height: 14px;
      transition: transform var(--transition-fast);
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    /* LuminSDK container styling */
    #games {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="games-header">
    <a href="/" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
      Back
    </a>
    <img src="logo.png" alt="Vyper">
    <h1>Games</h1>
  </div>
  <p class="games-subtitle">Browse and play — powered by LuminSDK</p>

  <!-- Games Grid -->
  <div id="games"></div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    Lumin.init({
      container: '#games',
      theme: 'dark',
      onReady: () => console.log('LuminSDK is ready'),
      onError: (err) => console.error('LuminSDK error:', err),
    });
  </script>

</body>
</html>
