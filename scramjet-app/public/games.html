<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vyper Games</title>
  <link rel="shortcut icon" href="logo.png" />
  <script src="theme.js"></script>
  <link rel="stylesheet" href="index.css" />
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
  <script src="background.js" defer></script>
  <style>
    body { margin: 0; }
    .games-container {
      margin-top: 80px;
      width: 100%;
      padding: 20px;
      min-height: calc(100vh - 80px);
    }
    .games-header { margin-bottom: 30px; }
    .games-header h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      color: var(--vyper-accent);
      text-shadow: 0 0 8px var(--vyper-accent), 0 0 16px var(--vyper-accent), 0 0 24px var(--vyper-accent);
      font-family: "Atomic Age", cursive;
    }
    .games-header p { color: var(--vyper-text); }

    /* Scale up the entire LuminSDK container */
    #games {
      transform-origin: top left;
      transform: scale(1.6);
      width: 62.5%; /* 100/1.6 to compensate for scale */
      margin-bottom: 60%;
    }

    @media (max-width: 1200px) {
      #games { transform: scale(1.3); width: 77%; margin-bottom: 40%; }
    }
    @media (max-width: 768px) {
      .games-container { margin-top: 80px; min-height: calc(100vh - 80px); }
      #games { transform: scale(1.1); width: 91%; margin-bottom: 20%; }
    }
    @media (max-width: 480px) {
      .games-container { margin-top: auto; padding: 15px; }
      #games { transform: scale(1); width: 100%; margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <div id="tsparticles"></div>
  <nav class="sidebar">
    <a href="index.html" class="sidebar-header" style="text-decoration: none;">
      <img class="sidebar-logo" src="logo.png" alt="Vyper" />
      <h2>Vyper</h2>
    </a>
    <ul class="nav-links">
      <li><a href="games.html" class="nav-link active"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></svg> Games</a></li>
       <li><a href="movies.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M7 4v16"/><path d="M17 4v16"/><path d="M2 8h5"/><path d="M2 12h5"/><path d="M2 16h5"/><path d="M17 8h5"/><path d="M17 12h5"/><path d="M17 16h5"/></svg> Movies</a></li>
      <li><a href="ai.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/><circle cx="12" cy="12" r="4"/></svg> AI</a></li>
      <li><a href="settings.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg> Settings</a></li>
    </ul>
  </nav>
  <div class="games-container">
    <div class="games-header">
      <h1>Games</h1>
      <p>Play your favorite games</p>
    </div>
    <div id="games"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    Lumin.init({
      container: '#games',
      theme: 'dark',
      onReady: () => console.log('LuminSDK is ready'),
      onError: (err) => console.error('LuminSDK error:', err),
    });
  </script>
</body>
</html>
