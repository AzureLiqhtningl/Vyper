<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vyper Games</title>
  <link rel="shortcut icon" href="logo.png" />
  <script src="theme.js"></script>
  <link rel="stylesheet" href="index.css" />
  <style>
    body { margin: 0; }
    .games-container {
      margin-top: 80px;
      width: 100%;
      padding: 20px;
      min-height: calc(100vh - 80px);
    }
    .games-header { margin-bottom: 30px; }
    .games-header h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      color: var(--vyper-accent);
      text-shadow: 0 0 8px var(--vyper-accent), 0 0 16px var(--vyper-accent), 0 0 24px var(--vyper-accent);
      font-family: "Atomic Age", cursive;
    }
    .games-header p { color: var(--vyper-text); }

    /* Scale up the entire LuminSDK container */
    #games {
      transform-origin: top left;
      transform: scale(1.6);
      width: 62.5%; /* 100/1.6 to compensate for scale */
      margin-bottom: 60%;
    }

    @media (max-width: 1200px) {
      #games { transform: scale(1.3); width: 77%; margin-bottom: 40%; }
    }
    @media (max-width: 768px) {
      .games-container { margin-top: 80px; min-height: calc(100vh - 80px); }
      #games { transform: scale(1.1); width: 91%; margin-bottom: 20%; }
    }
    @media (max-width: 480px) {
      .games-container { margin-top: auto; padding: 15px; }
      #games { transform: scale(1); width: 100%; margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-header">
      <img class="sidebar-logo" src="logo.png" alt="Vyper" />
      <h2>Vyper</h2>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">🌐 Home</a></li>
      <li><a href="games.html" class="nav-link active">🎮 Games</a></li>
      <li><a href="movies.html" class="nav-link">🎬 Movies</a></li>
      <li><a href="settings.html" class="nav-link">⚙️ Settings</a></li>
    </ul>
  </nav>
  <div class="games-container">
    <div class="games-header">
      <h1>Games</h1>
      <p>Play your favorite games</p>
    </div>
    <div id="games"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    Lumin.init({
      container: '#games',
      theme: 'dark',
      onReady: () => console.log('LuminSDK is ready'),
      onError: (err) => console.error('LuminSDK error:', err),
    });
  </script>
</body>
</html>
