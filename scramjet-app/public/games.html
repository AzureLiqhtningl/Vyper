<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vyper Games</title>
  <link rel="shortcut icon" href="logo.png" />
  <link rel="stylesheet" href="index.css" />
  <style>
    body { margin: 0; background: #111; }
    .games-container {
      margin-top: 80px;
      width: 100%;
      padding: 20px;
      min-height: calc(100vh - 80px);
    }
    .games-header { margin-bottom: 30px; }
    .games-header h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      color: #58F00C;
      text-shadow: 0 0 8px #58F00C, 0 0 16px #58F00C, 0 0 24px #58F00C;
      font-family: "Atomic Age", cursive;
    }

    /* Bigger grid cards */
    #games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    /* Force LuminSDK cards to fill their grid cell */
    #games > * {
      width: 100% !important;
      min-width: 0 !important;
    }

    #games img {
      width: 100% !important;
      height: 200px !important;
      object-fit: cover !important;
    }

    #games [class*="card"],
    #games [class*="game"],
    #games [class*="item"] {
      width: 100% !important;
      min-width: 0 !important;
    }

    @media (max-width: 768px) {
      .games-container { margin-top: 80px; min-height: calc(100vh - 80px); }
      #games { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    }
    @media (max-width: 480px) {
      .games-container { margin-top: auto; padding: 15px; }
      #games { grid-template-columns: 1fr 1fr; gap: 12px; }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-header">
      <img class="sidebar-logo" src="logo.png" alt="Vyper" />
      <h2>Vyper</h2>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">🌐 Home</a></li>
      <li><a href="games.html" class="nav-link active">🎮 Games</a></li>
      <li><a href="movies.html" class="nav-link">🎬 Movies</a></li>
      <li><a href="settings.html" class="nav-link">⚙️ Settings</a></li>
    </ul>
  </nav>
  <div class="games-container">
    <div class="games-header">
      <h1>Games</h1>
      <p>Play your favorite games</p>
    </div>
    <div id="games"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    Lumin.init({
      container: '#games',
      theme: 'dark',
      onReady: () => console.log('LuminSDK is ready'),
      onError: (err) => console.error('LuminSDK error:', err),
    });
  </script>
</body>
</html>
