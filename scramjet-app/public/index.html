<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Vyper | Proxy</title>

    <link rel="stylesheet" href="index.css" />

    <!-- JS -->
    <script src="index.js" defer></script>
    <script src="time.js" defer></script>
    <script src="info-panel.js" defer></script>
    <script src="cloak-dev.js" defer></script>
    <script src="settings.js" defer></script>
</head>

<body>

    <!-- CLOAKING BROWSER TAB -->
    <div class="browser-tab hidden" id="browser-tab">
        <div class="tab-controls-left">
            <button class="tab-btn" id="tab-back">⟵</button>
            <button class="tab-btn" id="tab-forward">⟶</button>
            <button class="tab-btn" id="tab-refresh">⟳</button>
        </div>

        <div class="tab-center">
            <input id="sj-address" class="tab-input" placeholder="Search or enter URL..." />
        </div>

        <div class="tab-controls-right">
            <button class="tab-btn" id="tab-close">✕</button>
        </div>
    </div>

    <!-- NAV BAR -->
    <div id="navbar">
        <button onclick="location.href='index.html'" class="nav-btn active">Home</button>
        <button onclick="location.href='games.html'" class="nav-btn">Games</button>
        <button onclick="location.href='settings.html'" class="nav-btn">Settings</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="header-center flex-center">

        <!-- LOGO + TITLE -->
        <div class="logo-wrapper">
            <img src="Vyper Logo.png" class="logo" alt="Vyper Logo" />
            <h1>Vyper | Proxy</h1>
            <p class="subtitle">the best proxy trust.</p>
        </div>

        <!-- SEARCH BAR (REAL ONE: #sj-address) -->
        <div class="search-container">
            <input id="sj-address" type="text" placeholder="Search the web..." />
        </div>

        <!-- TIME + DATE + DISCORD -->
        <div id="info-bar">
            <div class="info-inner">
                <p id="current-time"></p>
                <p id="current-date"></p>
                <a id="discord-link" href="https://discord.gg/Sbv6mx366h" target="_blank">Join the Discord</a>
            </div>
        </div>
    </div>

    <!-- RIGHT INFO PANEL -->
    <div id="info-panel">
        <div id="info-content">
            <h3>Vyper Info</h3>
            <p id="online-count">Users Online: ...</p>
        </div>
    </div>

</body>
</html>
