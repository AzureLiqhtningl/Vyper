<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
	<title>Vyper</title>
	<link rel="shortcut icon" href="logo.png" />
	<script src="/scram/scramjet.all.js"></script>
	<script src="/baremux/index.js"></script>
	<link rel="stylesheet" href="index.css" />
	<script src="register-sw.js" defer></script>
	<script src="search.js" defer></script>
	<script src="index.js" defer></script>
	<style>
		.hero-meta {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 6px;
			margin-top: 14px;
		}
		.hero-clock {
			font-family: 'Space Mono', monospace;
			font-size: 22px;
			color: #58F00C;
			text-shadow: 0 0 8px #58F00C;
		}
		.hero-date {
			font-family: 'Pixelify Sans', sans-serif;
			font-size: 15px;
			color: #C4C4C4;
		}
		#discord-popup {
			position: fixed;
			bottom: 24px;
			right: 24px;
			background: #5865F2;
			color: #fff;
			border-radius: 12px;
			padding: 14px 16px;
			display: flex;
			align-items: center;
			gap: 12px;
			box-shadow: 0 4px 24px rgba(88, 101, 242, 0.6);
			z-index: 99999;
			font-family: 'Pixelify Sans', sans-serif;
			font-size: 14px;
			max-width: 260px;
			animation: slideInPopup 0.4s ease;
		}
		@keyframes slideInPopup {
			from { opacity: 0; transform: translateY(20px); }
			to { opacity: 1; transform: translateY(0); }
		}
		#discord-popup a { color: #fff; text-decoration: underline; font-size: 13px; }
		#discord-popup-close {
			background: none; border: none; color: rgba(255,255,255,0.8);
			font-size: 16px; cursor: pointer; padding: 0;
			margin-left: auto; flex-shrink: 0; line-height: 1;
		}
		#discord-popup-close:hover { color: #fff; }
	</style>
</head>
<body>
	<nav class="sidebar">
		<div class="sidebar-header">
			<img class="sidebar-logo" src="logo.png" alt="Vyper" />
			<h2>Vyper</h2>
		</div>
		<ul class="nav-links">
			<li><a href="index.html" class="nav-link active">🌐 Home</a></li>
			<li><a href="games.html" class="nav-link">🎮 Games</a></li>
			<li><a href="movies.html" class="nav-link">🎬 Movies</a></li>
			<li><a href="settings.html" class="nav-link">⚙️ Settings</a></li>
		</ul>
	</nav>

	<div class="main-container">
		<div class="content-wrapper" style="justify-content:center; padding-top:160px;">
			<div class="hero-section" style="margin-bottom:32px;">
				<h1 class="hero-title">Vyper</h1>
				<p class="hero-subtitle">Free access to the open internet</p>
				<div class="hero-meta">
					<span class="hero-clock" id="hero-clock"></span>
					<span class="hero-date" id="hero-date"></span>
				</div>
			</div>
			<form id="sj-form" class="search-form">
				<input id="sj-search-engine" value="https://search.brave.com/search?q=%s" type="hidden" />
				<input id="sj-address" type="text" placeholder="Enter URL or search..." class="search-input" />
				<button type="submit" class="search-btn">Search</button>
			</form>
			<div class="info-box">
				<p>Vyper is a web proxy designed to bypass restrictions and access the web freely.</p>
			</div>
			<div class="error-container">
				<p id="sj-error"></p>
				<pre id="sj-error-code"></pre>
			</div>
		</div>
	</div>

	<div id="discord-popup">
		<svg width="28" height="28" viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
			<path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
		</svg>
		<div>
			<div style="font-weight:700; margin-bottom:3px;">Join our Discord!</div>
			<a href="https://discord.gg/n2vPSdJtY4" target="_blank">discord.gg/n2vPSdJtY4</a>
		</div>
		<button id="discord-popup-close" onclick="document.getElementById('discord-popup').style.display='none'">✕</button>
	</div>

	<script>
		function updateClock() {
			const now = new Date();
			document.getElementById('hero-clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
			document.getElementById('hero-date').textContent = now.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
		}
		updateClock();
		setInterval(updateClock, 1000);
	</script>
</body>
</html>
</html>
